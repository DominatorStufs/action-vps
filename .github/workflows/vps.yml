name: 🚀 Action VPS 😈🔥

on:
  workflow_dispatch:

jobs:
  vps:
    runs-on: ubuntu-latest

    steps:
      - name: 🛠️ Setup VPS 😎
        run: |
          echo "🚀 Updating system..."
          sudo apt update

          echo "📦 Installing packages..."
          sudo apt install -y openssh-server curl neofetch

          echo "🎲 Generating login..."
          USERNAME=$(tr -dc a-z0-9 </dev/urandom | head -c 10)
          PASSWORD=$(tr -dc A-Za-z0-9 </dev/urandom | head -c 10)

          echo "👤 Creating user..."
          sudo useradd -m $USERNAME
          echo "$USERNAME:$PASSWORD" | sudo chpasswd

          echo "🔥 Auto neofetch on login"
          echo "neofetch" >> /home/$USERNAME/.bashrc

          echo "🔐 Enabling SSH..."
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo service ssh start

          echo "USERNAME=$USERNAME" >> $GITHUB_ENV
          echo "PASSWORD=$PASSWORD" >> $GITHUB_ENV

      - name: 🌐 Install Tunnel 😈
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared

      - name: 🚀 Start Tunnel 🌍
        run: |
          ./cloudflared tunnel --url ssh://localhost:22 > tunnel.log 2>&1 &
          sleep 10
          cat tunnel.log

      - name: 🔐 Login Details 😏
        run: |
          echo "👤 USERNAME: $USERNAME"
          echo "🔑 PASSWORD: $PASSWORD"

      - name: ⏳ Keep Alive 😴
        run: sleep 21600
